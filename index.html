<!--
Website Title: Quiz Game

This website was developed as a 15-item Quiz Game with random questions 
from Science, Mathematics, and English. Each question had multiple-choice 
answers and a 10-second time limit.

When an answer was selected, it was automatically checked. 
If correct, the chosen answer turned green. If incorrect, it turned red.

The score was displayed at the top in the format “score/15”. 
The score increased for every correct answer and remained the same 
for incorrect answers while the quiz continued.

HTML was used for structure, CSS for design, and JavaScript 
for the timer, random questions, and score system.
-->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Start Screen -->
  <div id="start-screen">
    <div class="game-title">QUIZ GAME</div>
    <div class="subtitle">
      15 Questions • Science • Math • English<br><br>
      Test your knowledge and get the highest score!<br><br>
      💜 Good luck, player! 💜
    </div>
    <button class="btn" id="start-btn">Start Game</button>
  </div>

  <!-- Quiz Screen -->
  <div id="quiz-screen">
    <div class="progress-bar"><div class="progress" id="progress"></div></div>
    <div id="live-score">Score: 0</div>
    <div id="timer">Time: 10s</div>
    <h2 id="question"></h2>
    <div id="answer-buttons"></div>
    <button id="next-btn" class="btn">Next</button>
  </div>

  <!-- Background Music -->
  <audio id="bg-music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6b5a6dfc92.mp3?filename=retro-video-game-11292.mp3" type="audio/mpeg">
  </audio>

</div>

<script src="script.js"></script>
</body>

</html>
